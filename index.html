<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data in Everyday Life</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 60px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 600px;
            text-align: center;
        }
        h1 {
            color: #2E4057;
            font-size: 2em;
            margin-bottom: 20px;
        }
        p {
            color: #555;
            font-size: 1.1em;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Data in Everyday Life! 🎉</h1>
        <p>You're in! Get ready to see data differently — from tracking your fitness to managing your budget, data is everywhere in your daily life. Explore how everyday activities are full of numbers, graphs and patterns that you already understand more than you think!</p>
    </div>
</body>
</html>
